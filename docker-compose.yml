version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - fairdeal_network

  redis:
    image: redis:7.0-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fairdeal_network

  ai-service:
    build: ./ai-service
    container_name: ai_service
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
    networks:
      - fairdeal_network

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/fairdeal
      - REDIS_URL=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai-service:5001
      - JWT_SECRET_KEY=fairdeal-ai-super-secret-key-2024-do-not-share
    depends_on:
      - mongodb
      - redis
      - ai-service
    networks:
      - fairdeal_network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - fairdeal_network

networks:
  fairdeal_network:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
